<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Pousada da Nita</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: var(--bg-body);
      margin: 0;
    }
    .login-container {
      background-color: var(--bg-card);
      padding: 2.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-logo {
      max-width: 150px;
      margin-bottom: 2rem;
    }
    .login-container h2 {
      margin-top: 0;
      color: var(--text-dark);
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .form-group {
      text-align: left;
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-dark);
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 1rem;
    }
    .btn-login:hover {
      background-color: var(--primary-hover);
    }
    .login-error {
      color: var(--danger-color);
      background-color: #fee2e2;
      padding: 0.75rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
    .recover-password {
      display: block;
      margin-top: 1rem;
      font-size: 0.875rem;
      color: var(--primary-color);
      text-decoration: none;
    }
    .recover-password:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <img src="logo.png" alt="Logo Pousada da Nita" class="login-logo" onerror="this.style.display='none'">
    <h2>Acesso ao Sistema</h2>
    
    <div id="loginError" class="login-error">Credenciais inválidas.</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required placeholder="Digite seu e-mail">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" required placeholder="Digite sua senha">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
    </form>
    
    <a href="#" class="recover-password" id="recoverLink">Esqueci minha senha</a>
  </div>

  <script src="login.js"></script>
</body>
</html>
